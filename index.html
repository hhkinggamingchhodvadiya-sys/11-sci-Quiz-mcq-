            { question: "૬૦. દ બ્રોગ્લી સમીકરણ કયું છે?", options: ["λ = h/mv", "E = mc^2", "Δx . Δp ≥ h/4π", "E = hν"], answer: "λ = h/mv" },
            // ૬૧ થી ૭૦ (હવે ઉમેરેલા લેટેસ્ટ ૧૦ નવા પ્રશ્નો)
            { question: "૬૧. હાઇઝનબર્ગનો અનિશ્ચિતતાનો સિદ્ધાંત કયું સમીકરણ દર્શાવે છે?", options: ["Δx . Δp ≥ h/4π", "λ = h/p", "E = hν", "ΔE = hΔν"], answer: "Δx . Δp ≥ h/4π" },
            { question: "૬૨. p-કક્ષકનો આકાર કેવો હોય છે?", options: ["ગોળાકાર", "ડમ્બબેલ આકાર", "ડબલ ડમ્બબેલ", "અનિયમિત"], answer: "ડમ્બબેલ આકાર" },
            { question: "૬૩. d-કક્ષકનો આકાર કેવો હોય છે?", options: ["ગોળાકાર", "ડમ્બબેલ", "ડબલ ડમ્બબેલ", "જટિલ"], answer: "ડબલ ડમ્બબેલ" },
            { question: "૬૪. મુખ્ય ક્વોન્ટમ આંક n = 3 હોય, તો કુલ કેટલી કક્ષકો શક્ય બને?", options: ["3", "6", "9", "12"], answer: "9" },
            { question: "૬૫. સમાન પરમાણુ ક્રમાંક પરંતુ ભિન્ન પરમાણુ દળાંક ધરાવતા તત્વોને શું કહેવાય?", options: ["આઇસોટોપ (સમસ્થાનિકો)", "આઇસોબાર (સમદળીય)", "આઇસોટોન", "આઇસોમર"], answer: "આઇસોટોપ (સમસ્થાનિકો)" },

            { question: "૬૮. નોડલ સપાટી (Nodal Surface) એટલે એવી જગ્યા જ્યાં ઇલેક્ટ્રોન મળી આવવાની સંભાવના કેટલી હોય?", options: ["૧૦૦%", "૫૦%", "ઝીરો (૦%)", "૭૫%"], answer: "ઝીરો (૦%)" },
            { question: "૬૯. પ્લાન્ક અચળાંક (h) નું મૂલ્ય કેટલું છે?", options: ["6.626 x 10^-34 J s", "6.022 x 10^23 J s", "3.0 x 10^8 m/s", "1.6 x 10^-19 C"], answer: "6.626 x 10^-34 J s" },
            { question: "૭૦. કક્ષકોમાં ઇલેક્ટ્રોન તેમની વધતી જતી ઉર્જાના ક્રમમાં ગોઠવાય છે, આ કયો નિયમ છે?", options: ["આઉફબાઉ સિદ્ધાંત", "પાઉલી નિયમ", "હૂંડનો નિયમ", "ડાલ્ટન નિયમ"], answer: "આઉફબાઉ સિદ્ધાંત" }
        ]
    };

    let isQuizActive = false;

    function startQuiz(chapterKey) {
        isQuizActive = true;
        document.getElementById('chapter-selection').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        document.getElementById('hint-r').style.display = 'block';
        
        const titleMap = {
            chapter1: "પાઠ ૧: રસાયણવિજ્ઞાનની કેટલીક પાયાની વિભાવનાઓ (૨૨ પ્રશ્નો)",
            chapter2: "પાઠ ૨: પરમાણુનું બંધારણ (૭૦ પ્રશ્નો)"
        };
        
        document.getElementById('quiz-title').innerText = titleMap[chapterKey];
        
        const container = document.getElementById('quiz-container');
        container.innerHTML = ''; 
        
        const questions = quizData[chapterKey];
        
        questions.forEach((q, qIndex) => {
            const qDiv = document.createElement('div');
            qDiv.style.marginBottom = '30px';
            
            const qTitle = document.createElement('div');
            qTitle.className = 'question';
            qTitle.innerText = q.question;
            qDiv.appendChild(qTitle);
            
            q.options.forEach(option => {
                const optBtn = document.createElement('button');
                optBtn.className = 'option-btn';
                optBtn.innerText = option;
                
                optBtn.onclick = function() {
                    const siblings = qDiv.querySelectorAll('.option-btn');
                    siblings.forEach(btn => btn.disabled = true);
                    
                    if (option === q.answer) {
                        optBtn.classList.add('correct');
                    } else {
                        optBtn.classList.add('wrong');
                        siblings.forEach(btn => {
                            if (btn.innerText === q.answer) {
                                btn.classList.add('correct');
                            }
                        });
                    }
                };
                
                qDiv.appendChild(optBtn);
            });
            
            container.appendChild(qDiv);
        });
    }

    function goBack() {
        isQuizActive = false;
        document.getElementById('chapter-selection').style.display = 'block';
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('hint-r').style.display = 'none';
        window.scrollTo(0, 0);
    }

    // --- પ્યોર જમણેથી ડાબે સ્વાઇપ ગેસ્ચર કોડ ---
    let touchstartX = 0;
    let touchendX = 0;
    let touchstartY = 0;
    let touchendY = 0;
    
    document.addEventListener('touchstart', e => {
        touchstartX = e.changedTouches[0].screenX;
        touchstartY = e.changedTouches[0].screenY;
    });

    document.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        touchendY = e.changedTouches[0].screenY;
        handleGesture();
    });

    function handleGesture() {
        if (!isQuizActive) return;

        const xDistance = touchstartX - touchendX; // જમણેથી ડાબે ખેંચેલું અંતર
        const yDistance = Math.abs(touchstartY - touchendY); // ઊભું હલનચલન

        // જો યુઝરે જમણેથી ડાબે 70 પિક્સલ કરતાં વધુ સ્વાઇપ કર્યું હોય અને ઊભું બહુ સ્ક્રોલ ન થયું હોય
        if (xDistance > 70 && yDistance < 50) {
            goBack();
        }
    }
</script>
